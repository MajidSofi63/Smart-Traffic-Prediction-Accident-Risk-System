<!DOCTYPE html>
<html>
<head>
    <title>Route Risk Prediction - Smart Traffic System</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 350px;
            background: white;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 10;
        }
        .map-container {
            flex: 1;
            position: relative;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        h2 {
            color: #667eea;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .risk-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        .risk-card.show {
            display: block;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .risk-level {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .risk-low {
            background-color: #4CAF50;
            color: white;
        }
        .risk-medium {
            background-color: #ff9800;
            color: white;
        }
        .risk-high {
            background-color: #f44336;
            color: white;
        }
        .route-info {
            margin: 10px 0;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 5px;
        }
        .status {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 12px;
            text-align: center;
        }
        .reset-btn {
            background-color: #666;
        }
        .current-location {
            background-color: #2196F3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>🚗 Route Risk Predictor</h2>
            
            <div class="status" id="status">
                💡 Click on map to set START point
            </div>
            
            <div class="form-group">
                <label>📍 Start Point:</label>
                <input type="text" id="start" placeholder="Click on map or enter address" readonly>
            </div>
            
            <div class="form-group">
                <label>🏁 Destination:</label>
                <input type="text" id="end" placeholder="Click on map or enter address" readonly>
            </div>
            
            <div class="form-group">
                <label>🚗 Vehicle Type:</label>
                <select id="vehicle_type">
                    <option value="Car">Car</option>
                    <option value="Motorcycle">Motorcycle</option>
                    <option value="Taxi/Private hire car">Taxi</option>
                    <option value="Bus">Bus</option>
                    <option value="Goods vehicle">Truck</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>⏰ Time of Day:</label>
                <select id="time_of_day">
                    <option value="Morning">Morning (6AM - 12PM)</option>
                    <option value="Afternoon">Afternoon (12PM - 5PM)</option>
                    <option value="Evening">Evening (5PM - 9PM)</option>
                    <option value="Night">Night (9PM - 6AM)</option>
                </select>
            </div>
            
            <button onclick="getCurrentLocation()" class="current-location">📍 Use My Current Location</button>
            <button onclick="calculateRoute()">🔍 Calculate Route & Risk</button>
            <button onclick="resetSelection()" class="reset-btn">🔄 Reset Selection</button>
            
            <div id="riskCard" class="risk-card">
                <h3>⚠️ Route Risk Assessment</h3>
                <div id="riskLevel" class="risk-level"></div>
                <div id="routeInfo" class="route-info"></div>
                <div id="riskFactors"></div>
                <div id="recommendation"></div>
            </div>
        </div>
        
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <script>
        let map;
        let startMarker = null;
        let endMarker = null;
        let routeLayer = null;
        let selectingStart = true;
        
        // Initialize map
        function initMap() {
            // Create map centered on India
            map = L.map('map').setView([20.5937, 78.9629], 5);
            
            // Add tile layer
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
            
            // Add click handler
            map.on('click', onMapClick);
            
            // Update status
            document.getElementById('status').innerHTML = '💡 Click on map to set START point';
        }
        
        function onMapClick(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            const coordString = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            
            if (selectingStart) {
                // Set start point
                if (startMarker) {
                    map.removeLayer(startMarker);
                }
                startMarker = L.marker([lat, lng], {
                    icon: L.divIcon({
                        html: '<div style="background-color: #4CAF50; width: 20px; height: 20px; border-radius: 50%; border: 2px solid white;"></div>',
                        iconSize: [24, 24],
                        className: 'custom-marker'
                    })
                }).addTo(map);
                startMarker.bindPopup('Start Point').openPopup();
                
                document.getElementById('start').value = coordString;
                document.getElementById('status').innerHTML = '✅ Start point set! Now click on map to set DESTINATION';
                selectingStart = false;
            } else {
                // Set end point
                if (endMarker) {
                    map.removeLayer(endMarker);
                }
                endMarker = L.marker([lat, lng], {
                    icon: L.divIcon({
                        html: '<div style="background-color: #f44336; width: 20px; height: 20px; border-radius: 50%; border: 2px solid white;"></div>',
                        iconSize: [24, 24],
                        className: 'custom-marker'
                    })
                }).addTo(map);
                endMarker.bindPopup('Destination').openPopup();
                
                document.getElementById('end').value = coordString;
                document.getElementById('status').innerHTML = '✅ Destination set! Click "Calculate Route & Risk" to see the route';
                selectingStart = true;
                
                // Auto-zoom to show both points
                if (startMarker && endMarker) {
                    const bounds = L.latLngBounds([
                        startMarker.getLatLng(),
                        endMarker.getLatLng()
                    ]);
                    map.fitBounds(bounds, { padding: [50, 50] });
                }
            }
        }
        
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        const coordString = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                        
                        if (startMarker) {
                            map.removeLayer(startMarker);
                        }
                        startMarker = L.marker([lat, lng], {
                            icon: L.divIcon({
                                html: '<div style="background-color: #4CAF50; width: 20px; height: 20px; border-radius: 50%; border: 2px solid white;"></div>',
                                iconSize: [24, 24],
                                className: 'custom-marker'
                            })
                        }).addTo(map);
                        startMarker.bindPopup('Your Location').openPopup();
                        
                        document.getElementById('start').value = coordString;
                        document.getElementById('status').innerHTML = '✅ Start point set! Now click on map to set DESTINATION';
                        selectingStart = false;
                        map.setView([lat, lng], 13);
                    },
                    function(error) {
                        alert("Error getting location: " + error.message);
                    }
                );
            } else {
                alert("Geolocation not supported by your browser");
            }
        }
        
        function resetSelection() {
            if (startMarker) map.removeLayer(startMarker);
            if (endMarker) map.removeLayer(endMarker);
            if (routeLayer) map.removeLayer(routeLayer);
            
            startMarker = null;
            endMarker = null;
            routeLayer = null;
            selectingStart = true;
            
            document.getElementById('start').value = '';
            document.getElementById('end').value = '';
            document.getElementById('riskCard').classList.remove('show');
            document.getElementById('status').innerHTML = '💡 Click on map to set START point';
            
            map.setView([20.5937, 78.9629], 5);
        }
        
        async function calculateRoute() {
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            
            if (!start || !end) {
                alert("Please set both start and destination points");
                return;
            }
            
            // Show loading
            document.getElementById('riskCard').classList.add('show');
            document.getElementById('riskLevel').innerHTML = "Calculating route...";
            document.getElementById('riskLevel').className = "risk-level";
            
            try {
                // Parse coordinates
                const startParts = start.split(',').map(Number);
                const endParts = end.split(',').map(Number);
                
                const startCoords = { lat: startParts[0], lng: startParts[1] };
                const endCoords = { lat: endParts[0], lng: endParts[1] };
                
                // Get route
                const route = await getRoute(startCoords, endCoords);
                
                // Display route
                displayRoute(route, startCoords, endCoords);
                
                // Calculate risk
                const vehicleType = document.getElementById('vehicle_type').value;
                const timeOfDay = document.getElementById('time_of_day').value;
                const risk = calculateRiskScore(route, vehicleType, timeOfDay);
                
                // Display risk assessment
                displayRiskAssessment(risk);
                
            } catch (error) {
                console.error(error);
                document.getElementById('riskLevel').innerHTML = "Error calculating route";
                document.getElementById('riskLevel').className = "risk-level risk-high";
                alert("Error: " + error.message);
            }
        }
        
        async function getRoute(start, end) {
            const url = `https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.code !== 'Ok') {
                throw new Error("Route not found");
            }
            
            return {
                distance: data.routes[0].distance / 1000,
                duration: data.routes[0].duration / 60,
                geometry: data.routes[0].geometry
            };
        }
        
        function displayRoute(route, start, end) {
            // Remove old route
            if (routeLayer) {
                map.removeLayer(routeLayer);
            }
            
            // Add new route
            routeLayer = L.geoJSON(route.geometry, {
                style: { color: '#2196F3', weight: 5, opacity: 0.8 }
            }).addTo(map);
            
            // Fit bounds
            const bounds = L.latLngBounds([
                [start.lat, start.lng],
                [end.lat, end.lng]
            ]);
            map.fitBounds(bounds, { padding: [50, 50] });
        }
        
        function calculateRiskScore(route, vehicleType, timeOfDay) {
            const distance = route.distance;
            const duration = route.duration;
            const avgSpeed = distance / (duration / 60);
            
            let riskScore = 0;
            let riskFactors = [];
            
            if (distance > 500) {
                riskScore += 30;
                riskFactors.push("⚠️ Long distance route (>500km)");
            } else if (distance > 200) {
                riskScore += 15;
                riskFactors.push("📏 Moderate distance route");
            }
            
            if (avgSpeed > 100) {
                riskScore += 25;
                riskFactors.push("🏁 High average speed (>100 km/h)");
            } else if (avgSpeed > 80) {
                riskScore += 15;
                riskFactors.push("⚡ Moderate to high speed");
            }
            
            if (timeOfDay === 'Night') {
                riskScore += 25;
                riskFactors.push("🌙 Night travel (reduced visibility)");
            } else if (timeOfDay === 'Evening') {
                riskScore += 10;
                riskFactors.push("🌆 Evening travel (peak accident hours)");
            }
            
            if (vehicleType === 'Motorcycle') {
                riskScore += 15;
                riskFactors.push("🏍️ Motorcycle (higher vulnerability)");
            } else if (vehicleType === 'Goods vehicle') {
                riskScore += 10;
                riskFactors.push("🚛 Heavy vehicle (longer stopping distance)");
            }
            
            let riskLevel = "Low";
            let riskColor = "risk-low";
            if (riskScore >= 50) {
                riskLevel = "High";
                riskColor = "risk-high";
            } else if (riskScore >= 25) {
                riskLevel = "Medium";
                riskColor = "risk-medium";
            }
            
            return {
                riskLevel: riskLevel,
                riskScore: riskScore,
                riskColor: riskColor,
                riskFactors: riskFactors,
                distance: distance,
                duration: duration,
                avgSpeed: avgSpeed
            };
        }
        
        function displayRiskAssessment(risk) {
            const riskLevelDiv = document.getElementById('riskLevel');
            riskLevelDiv.innerHTML = risk.riskLevel + " Risk";
            riskLevelDiv.className = "risk-level " + risk.riskColor;
            
            document.getElementById('routeInfo').innerHTML = `
                📍 Distance: ${risk.distance.toFixed(1)} km<br>
                ⏱️ Duration: ${risk.duration.toFixed(0)} minutes<br>
                🚗 Average Speed: ${risk.avgSpeed.toFixed(0)} km/h
            `;
            
            let riskFactorsHtml = "<strong>Risk Factors:</strong><ul>";
            risk.riskFactors.forEach(factor => {
                riskFactorsHtml += `<li>${factor}</li>`;
            });
            riskFactorsHtml += "</ul>";
            document.getElementById('riskFactors').innerHTML = riskFactorsHtml;
            
            let recommendation = "";
            if (risk.riskLevel === "High") {
                recommendation = "🚨 HIGH RISK: Consider alternative route, travel during daytime, reduce speed, and stay alert!";
            } else if (risk.riskLevel === "Medium") {
                recommendation = "⚠️ MEDIUM RISK: Exercise caution, follow traffic rules, and avoid distractions.";
            } else {
                recommendation = "✅ LOW RISK: Safe journey! Continue following traffic regulations.";
            }
            document.getElementById('recommendation').innerHTML = `<strong>💡 Recommendation:</strong><br>${recommendation}`;
        }
        
        // Initialize map when page loads
        window.addEventListener('load', initMap);
    </script>
</body>
</html>
