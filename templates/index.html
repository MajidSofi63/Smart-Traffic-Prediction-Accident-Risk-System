<!DOCTYPE html>
<html>
<head>
    <title>Smart Traffic System</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding-top: 50px;
        }
        form {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
        input, select {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background: #2a5298;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>🚦 Smart Traffic Prediction</h1>

<form action="/predict" method="post">
    <input type="number" name="time" placeholder="Enter Time (0-23)" required><br>

    <select name="weather">
        <option value="clear">Clear</option>
        <option value="rain">Rain</option>
        <option value="fog">Fog</option>
    </select><br>

    <input type="number" name="vehicles" placeholder="Number of Vehicles" required><br>

    <button type="submit">Predict</button>
</form>

</body>
</html>
